<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой портал - Вход</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .user-info {
            display: none;
            margin: 20px 0;
        }
        
        .user-info.active {
            display: block;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 10px auto;
            border: 3px solid #667eea;
        }
        
        .email {
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-logout {
            background: #e74c3c;
        }
        
        .btn-logout:hover {
            background: #c0392b;
        }
        
        .login-section {
            display: block;
        }
        
        .login-section.hidden {
            display: none;
        }
        
        .loading {
            display: none;
            color: #667eea;
            margin: 10px 0;
        }
        
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>Игровой портал</h1>
        
        <!-- Секция логина -->
        <div class="login-section" id="loginSection">
            <p>Войдите через Google для доступа к играм</p>
            
            <!-- Google Sign-In кнопка -->
            <div id="g_id_onload"
                 data-client_id="492984680452-38qrkmefqd8ilc2fuda0h2t8jc8cf0qr.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
            
            <div class="loading" id="loading">Выполняется вход...</div>
        </div>
        
        <!-- Секция профиля (изначально скрыта) -->
        <div class="user-info" id="userInfo">
            <img class="avatar" id="avatar" src="" alt="Avatar">
            <div class="email" id="email"></div>
            <div id="displayName" style="color: #333; margin: 5px 0;"></div>
            
            <a href="games.html" class="btn" id="gamesBtn">
                🎲 Перейти к играм
            </a>
            <button class="btn btn-logout" onclick="logout()">
                Выйти
            </button>
        </div>
    </div>

    <script>
        // Ждем загрузки Google Identity Services
        window.onload = function() {
            checkSession();
        };
        
        // Функция обратного вызова от Google
        function handleCredentialResponse(response) {
            console.log("Google ответ получен!");
            document.getElementById('loading').classList.add('active');
            
            try {
                // Декодируем JWT токен
                const userData = parseJwt(response.credential);
                console.log("Данные пользователя:", userData);
                
                // Сохраняем в localStorage
                const userInfo = {
                    email: userData.email,
                    name: userData.name,
                    picture: userData.picture,
                    given_name: userData.given_name || userData.name
                };
                
                localStorage.setItem('google_user', JSON.stringify(userInfo));
                console.log("Данные сохранены в localStorage");
                
                // Показываем профиль
                showUserInfo(userInfo);
                
                document.getElementById('loading').classList.remove('active');
                
            } catch (error) {
                console.error("Ошибка при обработке входа:", error);
                document.getElementById('loading').classList.remove('active');
                alert("Ошибка входа. Проверьте консоль (F12)");
            }
        }
        
        // Декодирование JWT
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            return JSON.parse(jsonPayload);
        }
        
        // Показать информацию о пользователе
        function showUserInfo(userData) {
            console.log("Показываю профиль пользователя");
            
            // Скрываем секцию логина
            document.getElementById('loginSection').classList.add('hidden');
            
            // Заполняем данные
            document.getElementById('avatar').src = userData.picture;
            document.getElementById('email').textContent = userData.email;
            document.getElementById('displayName').textContent = 
                'Привет, ' + (userData.given_name || userData.name) + '!';
            
            // Показываем секцию профиля
            document.getElementById('userInfo').classList.add('active');
        }
        
        // Проверка сохраненной сессии
        function checkSession() {
            const savedUser = localStorage.getItem('google_user');
            if (savedUser) {
                try {
                    const userData = JSON.parse(savedUser);
                    showUserInfo(userData);
                } catch (e) {
                    console.error("Ошибка чтения сессии:", e);
                }
            }
        }
        
        // Выход
        function logout() {
            localStorage.removeItem('google_user');
            
            // Показываем секцию логина
            document.getElementById('loginSection').classList.remove('hidden');
            
            // Скрываем профиль
            document.getElementById('userInfo').classList.remove('active');
            
            // Перезагружаем страницу для сброса Google
            setTimeout(function() {
                window.location.reload();
            }, 500);
        }
    </script>
</body>
</html>
